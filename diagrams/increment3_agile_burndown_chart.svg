<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 820 540" role="img" font-family="Segoe UI, Arial, Helvetica, sans-serif">
<title>Agile Burndown Chart — DEICMS (14-Day Sprint)</title>
<desc>Sprint burndown chart showing ideal vs actual story points remaining over a 14-day sprint. The team started at 42 points and delivered all work by day 14.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9" fill="none" stroke="#6B6B66" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="820" height="540" fill="#FFFFFF"/>

<!-- Title -->
<text x="40" y="28" font-size="18" fill="#3C3489" text-anchor="start" font-weight="700" dominant-baseline="central">Agile Burndown Chart — DEICMS (14-Day Sprint)</text>
<text x="40" y="50" font-size="11" fill="#6B6B66" text-anchor="start" font-weight="400" dominant-baseline="central">42 story points · Increment 3 · Ideal vs Actual velocity</text>

<!-- ====== CHART AREA ====== -->
<!-- Axes -->
<!-- Y-axis -->
<line x1="100" y1="80" x2="100" y2="460" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- X-axis -->
<line x1="100" y1="460" x2="780" y2="460" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Y-axis label -->
<text x="30" y="270" font-size="11" fill="#6B6B66" text-anchor="middle" font-weight="600" transform="rotate(-90,30,270)">Story Points Remaining</text>

<!-- X-axis label -->
<text x="440" y="498" font-size="11" fill="#6B6B66" text-anchor="middle" font-weight="600">Sprint Day</text>

<!-- Y-axis ticks and grid (0 to 42, step 6) -->
<!-- Points: 0->y460, 6->y414, 12->y368, 18->y322, 24->y276, 30->y230, 36->y184, 42->y138 -->
<!-- scale: (42-val)/42 * 322 + 138 -->
<line x1="96"  y1="460" x2="780" y2="460" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="460" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">0</text>
<line x1="96"  y1="414" x2="780" y2="414" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="414" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">6</text>
<line x1="96"  y1="368" x2="780" y2="368" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="368" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">12</text>
<line x1="96"  y1="322" x2="780" y2="322" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="322" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">18</text>
<line x1="96"  y1="276" x2="780" y2="276" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="276" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">24</text>
<line x1="96"  y1="230" x2="780" y2="230" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="230" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">30</text>
<line x1="96"  y1="184" x2="780" y2="184" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="184" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">36</text>
<line x1="96"  y1="138" x2="780" y2="138" stroke="#EEF0F8" stroke-width="0.8"/>
<text x="90"   y="138" font-size="10" fill="#6B6B66" text-anchor="end" dominant-baseline="central">42</text>

<!-- X-axis ticks (Day 0–14) -->
<!-- 14 intervals: x = 100 + day * (660/14) = 100 + day * 47.14 -->
<!-- Day 0=100, 1=147, 2=194, 3=241, 4=288, 5=335, 6=382, 7=430, 8=477, 9=524, 10=571, 11=618, 12=665, 13=712, 14=760 -->
<text x="100"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">0</text>
<text x="147"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">1</text>
<text x="194"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">2</text>
<text x="241"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">3</text>
<text x="288"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">4</text>
<text x="335"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">5</text>
<text x="382"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">6</text>
<text x="430"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">7</text>
<text x="477"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">8</text>
<text x="524"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">9</text>
<text x="571"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">10</text>
<text x="618"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">11</text>
<text x="665"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">12</text>
<text x="712"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">13</text>
<text x="760"  y="474" font-size="10" fill="#6B6B66" text-anchor="middle">14</text>

<!-- ====== DATA ====== -->
<!-- y = 138 + (42 - pts) / 42 * 322   ideal: 42,39,36,33,30,27,24,21,18,15,12,9,6,3,0  -->
<!-- actual: 42,40,37,34,30,28,25,22,19,16,13,10,7,4,0 -->

<!-- Ideal burndown (deep purple #3C3489) -->
<polyline
  points="100,138  147,161  194,184  241,207  288,230  335,253  382,276  430,299  477,322  524,345  571,368  618,391  665,414  712,437  760,460"
  fill="none" stroke="#3C3489" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>

<!-- Actual burndown (green #1D9E75) -->
<polyline
  points="100,138  147,153  194,176  241,199  288,230  335,245  382,268  430,291  477,314  524,337  571,360  618,383  665,406  712,429  760,460"
  fill="none" stroke="#1D9E75" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="8 4"/>

<!-- Data dots — Ideal -->
<circle cx="100" cy="138" r="4" fill="#3C3489"/>
<circle cx="147" cy="161" r="4" fill="#3C3489"/>
<circle cx="194" cy="184" r="4" fill="#3C3489"/>
<circle cx="241" cy="207" r="4" fill="#3C3489"/>
<circle cx="288" cy="230" r="4" fill="#3C3489"/>
<circle cx="335" cy="253" r="4" fill="#3C3489"/>
<circle cx="382" cy="276" r="4" fill="#3C3489"/>
<circle cx="430" cy="299" r="4" fill="#3C3489"/>
<circle cx="477" cy="322" r="4" fill="#3C3489"/>
<circle cx="524" cy="345" r="4" fill="#3C3489"/>
<circle cx="571" cy="368" r="4" fill="#3C3489"/>
<circle cx="618" cy="391" r="4" fill="#3C3489"/>
<circle cx="665" cy="414" r="4" fill="#3C3489"/>
<circle cx="712" cy="437" r="4" fill="#3C3489"/>
<circle cx="760" cy="460" r="4" fill="#3C3489"/>

<!-- Data dots — Actual -->
<circle cx="100" cy="138" r="4" fill="#1D9E75"/>
<circle cx="147" cy="153" r="4" fill="#1D9E75"/>
<circle cx="194" cy="176" r="4" fill="#1D9E75"/>
<circle cx="241" cy="199" r="4" fill="#1D9E75"/>
<circle cx="288" cy="230" r="4" fill="#1D9E75"/>
<circle cx="335" cy="245" r="4" fill="#1D9E75"/>
<circle cx="382" cy="268" r="4" fill="#1D9E75"/>
<circle cx="430" cy="291" r="4" fill="#1D9E75"/>
<circle cx="477" cy="314" r="4" fill="#1D9E75"/>
<circle cx="524" cy="337" r="4" fill="#1D9E75"/>
<circle cx="571" cy="360" r="4" fill="#1D9E75"/>
<circle cx="618" cy="383" r="4" fill="#1D9E75"/>
<circle cx="665" cy="406" r="4" fill="#1D9E75"/>
<circle cx="712" cy="429" r="4" fill="#1D9E75"/>
<circle cx="760" cy="460" r="4" fill="#1D9E75"/>

<!-- ====== LEGEND ====== -->
<rect x="560" y="104" width="220" height="78" rx="6" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="1.1"/>
<text x="570" y="118" font-size="10.5" fill="#3C3489" text-anchor="start" font-weight="700" dominant-baseline="central">Legend</text>
<line x1="570" y1="132" x2="606" y2="132" stroke="#3C3489" stroke-width="2.2"/>
<circle cx="588" cy="132" r="3.5" fill="#3C3489"/>
<text x="614" y="132" font-size="10" fill="#2D3B3A" text-anchor="start" dominant-baseline="central">Ideal Burndown</text>
<line x1="570" y1="154" x2="606" y2="154" stroke="#1D9E75" stroke-width="2.2" stroke-dasharray="8 4"/>
<circle cx="588" cy="154" r="3.5" fill="#1D9E75"/>
<text x="614" y="154" font-size="10" fill="#2D3B3A" text-anchor="start" dominant-baseline="central">Actual Burndown</text>
<text x="570" y="172" font-size="9.5" fill="#6B6B66" text-anchor="start" dominant-baseline="central">Sprint completed on day 14</text>

<!-- Annotation: slight slip days 1-3 -->
<rect x="130" y="84" width="180" height="40" rx="4" fill="#FFF8E1" stroke="#F39C12" stroke-width="0.8"/>
<text x="220" y="100" font-size="9.5" fill="#7D6608" text-anchor="middle" font-weight="600" dominant-baseline="central">Days 1–3: slight slip (+2 pts)</text>
<text x="220" y="114" font-size="9" fill="#7D6608" text-anchor="middle" dominant-baseline="central">recovered fully by day 14</text>
<line x1="185" y1="124" x2="165" y2="162" stroke="#F39C12" stroke-width="0.8"/>
</svg>