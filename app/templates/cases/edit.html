{% extends 'base.html' %}
{% block title %}Edit Case — DEICMS{% endblock %}
{% block content %}
<div class="topbar">
  <span class="page-title"><i class="bi bi-pencil me-2"></i>Edit {{ case.case_number }}</span>
  <a href="{{ url_for('cases.view_case', case_id=case.id) }}" class="btn btn-outline-secondary btn-sm">
    Back
  </a>
</div>

<div class="card" style="max-width:640px;">
  <div class="card-body p-4">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Case Title</label>
        <input type="text" name="title" class="form-control" value="{{ case.title }}" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ case.description or '' }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Jurisdiction</label>
        <input type="text" name="jurisdiction" class="form-control" value="{{ case.jurisdiction or '' }}"/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Status</label>
        <select name="status" class="form-select">
          {% for s in ['Open','Active','Pending','Closed'] %}
          <option value="{{ s }}" {% if case.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary fw-semibold">
          <i class="bi bi-check-lg me-1"></i>Save Changes
        </button>
        <a href="{{ url_for('cases.view_case', case_id=case.id) }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
