{% extends 'base.html' %}
{% block title %}New Case — DEICMS{% endblock %}
{% block content %}
<div class="topbar">
  <span class="page-title"><i class="bi bi-folder-plus me-2"></i>Create New Case</span>
  <a href="{{ url_for('cases.list_cases') }}" class="btn btn-outline-secondary btn-sm">
    Back
  </a>
</div>

<div class="card" style="max-width:640px;">
  <div class="card-body p-4">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Case Title <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" placeholder="e.g. Corporate Fraud Investigation" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Description</label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="Brief description of the case..."></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Jurisdiction</label>
        <input type="text" name="jurisdiction" class="form-control" placeholder="e.g. Italy, Messina"/>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary fw-semibold">
          <i class="bi bi-check-lg me-1"></i>Create Case
        </button>
        <a href="{{ url_for('cases.list_cases') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
