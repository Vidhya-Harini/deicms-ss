<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — DEICMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background:#f4f7f6; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family: 'Source Sans 3', sans-serif; }
    .reg-card { width:100%; max-width:460px; border:none; border-radius:14px; box-shadow:0 4px 24px rgba(0,0,0,.06); }
    .reg-header { background:#2D3B3A; border-radius:14px 14px 0 0; padding:1.5rem 2rem; text-align:center; }
    .reg-header h4 { color:#fff; margin:0; font-weight:700; }
    .reg-header span { color:#3DBFA0; }
    .reg-header p { color:#A8BFBD; font-size:.85rem; margin:.4rem 0 0; }
    .btn-primary { background: #2D8A6A !important; border-color: #2D8A6A !important; }
    .btn-primary:hover { background: #246E55 !important; border-color: #246E55 !important; }
    .form-control:focus, .form-select:focus {
      border-color: #3DBFA0 !important;
      box-shadow: 0 0 0 3px rgba(61, 191, 160, 0.15) !important;
    }
    .alert-success, .alert-info {
      background-color: #E8F5F0 !important;
      border: 1px solid #A8D8C8 !important;
      color: #1E5E48 !important;
    }
    a { color: #2D8A6A; text-decoration: none; font-weight: 500; }
    a:hover { color: #1b5e4a; text-decoration: underline; }
  </style>
</head>
<body>
<div class="reg-card card">
  <div class="reg-header">
    <h4>DEI<span>CMS</span></h4>
    <p>Create Investigator Account</p>
  </div>
  <div class="card-body p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Full Name</label>
        <input type="text" name="full_name" class="form-control" placeholder="Dr. Jane Smith" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="investigator@example.com" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Role</label>
        <select name="role" class="form-select">
          <option value="Admin">Admin</option>
          <option value="Lead Investigator">Lead Investigator</option>
          <option value="Analyst" selected>Analyst</option>
          <option value="Read-Only">Read-Only</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-person-plus me-1"></i> Create Account
      </button>
    </form>
    <div class="text-center mt-3">
      <small class="text-muted">Already have an account?
        <a href="{{ url_for('auth.login') }}">Log in</a>
      </small>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
